name: Build And Release Binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ntfs-share-wizard-linux-x86_64
            binary_name: ntfs-share-wizard-linux-x86_64
            binary_suffix: ""
          - label: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ntfs-share-wizard-windows-x86_64
            binary_name: ntfs-share-wizard-windows-x86_64.exe
            binary_suffix: .exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Organize release binary
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "target/${{ matrix.target }}/release/ntfs-share-wizard${{ matrix.binary_suffix }}" \
            "dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist -maxdepth 3 -type f | sort
          cp dist/ntfs-share-wizard-linux-x86_64/ntfs-share-wizard-linux-x86_64 \
            release-assets/ntfs-share-wizard-linux-x86_64
          cp dist/ntfs-share-wizard-windows-x86_64/ntfs-share-wizard-windows-x86_64.exe \
            release-assets/ntfs-share-wizard-windows-x86_64.exe
          find release-assets -maxdepth 1 -type f | sort

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh --version

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              release-assets/ntfs-share-wizard-linux-x86_64 \
              release-assets/ntfs-share-wizard-windows-x86_64.exe \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              release-assets/ntfs-share-wizard-linux-x86_64 \
              release-assets/ntfs-share-wizard-windows-x86_64.exe \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --repo "${GITHUB_REPOSITORY}"
          fi
